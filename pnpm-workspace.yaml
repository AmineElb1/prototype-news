packages:
  - '.'
supportedArchitectures:
  os:
    - linux
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
# GitLab's npm registry doesn't publish a "time" field, so the age check can't
# apply to our internal, already-trusted @chameleon packages.
minimumReleaseAgeExclude:
  - '@chameleon/*'
